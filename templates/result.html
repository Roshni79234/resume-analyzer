<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .score {
            font-size: 28px;
            font-weight: bold;
            color: green;
        }

        .role {
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Analysis Result</h1>

    <div class="role">
        <strong>Role:</strong> {{ role }}
    </div>

    <div class="score">
        {{ score }}
    </div>

    <br>

    <a href="/">Analyze Another Resume</a>
</div>

</body>
</html>
